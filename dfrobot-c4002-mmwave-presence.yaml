blueprint:
  name: DFRobot C4002 mmWave Presence Trigger
  description: >
    Trigger automations based on the DFRobot C4002 mmWave presence sensor (via ESPHome).
    Select your ESPHome device and the "Target Status" text sensor.
    The direction sensor is resolved automatically from the device.
    Configure separate actions for when presence is detected and when presence is cleared.
  domain: automation
  author: RSVH
  homeassistant:
    min_version: "2024.6.0"

  input:
    esphome_device:
      name: ESPHome C4002 Device
      description: >
        Select the ESPHome device with the DFRobot C4002 mmWave sensor.
        The direction sensor is resolved automatically from this device.
      selector:
        device:
          integration: esphome

    target_status_entity:
      name: Target Status Sensor
      description: >
        Select the "Target Status" text sensor from your C4002 device.
        Expected states: "No Target", "Static Presence", "Motion".
      selector:
        entity:
          integration: esphome
          domain: sensor

    presence_trigger:
      name: Trigger Presence On
      description: Which detection state counts as "presence detected"?
      default: any_presence
      selector:
        select:
          options:
            - label: "Any Presence (Static or Motion)"
              value: any_presence
            - label: "Motion Only"
              value: motion_only
            - label: "Static Presence Only"
              value: static_only

    use_direction_filter:
      name: Filter by Movement Direction
      description: Optionally restrict the presence trigger to a specific movement direction.
      default: false
      selector:
        boolean:

    required_direction:
      name: Required Direction
      description: Only trigger presence actions if movement direction matches this value.
      default: "Approaching"
      selector:
        select:
          options:
            - label: "Approaching"
              value: "Approaching"
            - label: "Away"
              value: "Away"
            - label: "No Direction"
              value: "No Direction"

    trigger_delay:
      name: Trigger Delay
      description: Optional delay before any action fires (debounce).
      default:
        hours: 0
        minutes: 0
        seconds: 0
      selector:
        duration:

    presence_actions:
      name: Actions — Presence Detected
      description: Actions to run when presence is detected.
      default: []
      selector:
        action:

    no_presence_actions:
      name: Actions — No Presence (Cleared)
      description: Actions to run when no target is detected.
      default: []
      selector:
        action:

variables:
  esphome_device: !input esphome_device
  presence_trigger: !input presence_trigger
  use_direction_filter: !input use_direction_filter
  required_direction: !input required_direction

  direction_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'movement_direction')
       | list | first | default('') }}

trigger:
  - platform: state
    entity_id: !input target_status_entity
    to: "No Target"
    id: presence_cleared

  - platform: state
    entity_id: !input target_status_entity
    to: "Static Presence"
    id: presence_static

  - platform: state
    entity_id: !input target_status_entity
    to: "Motion"
    id: presence_motion

condition: []

action:
  - delay: !input trigger_delay

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% if presence_trigger == 'any_presence' %}
                {{ trigger.id in ['presence_static', 'presence_motion'] }}
              {% elif presence_trigger == 'motion_only' %}
                {{ trigger.id == 'presence_motion' }}
              {% elif presence_trigger == 'static_only' %}
                {{ trigger.id == 'presence_static' }}
              {% else %}
                false
              {% endif %}
          - condition: template
            value_template: >
              {% if not use_direction_filter or direction_entity == '' %}
                true
              {% else %}
                {{ states(direction_entity) == required_direction }}
              {% endif %}
        sequence: !input presence_actions

      - conditions:
          - condition: trigger
            id: presence_cleared
        sequence: !input no_presence_actions