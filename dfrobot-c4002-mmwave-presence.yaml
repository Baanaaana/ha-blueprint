blueprint:
  name: DFRobot C4002 mmWave Presence Trigger
  description: >
    Trigger automations based on the DFRobot C4002 mmWave presence sensor (via ESPHome).
    Select your ESPHome device and all sensors are resolved automatically.
    Supports triggering on presence/motion detection, disappearance, movement direction,
    and optional distance thresholds.
  domain: automation
  author: RSVH
  homeassistant:
    min_version: "2024.6.0"

  input:
    esphome_device:
      name: ESPHome C4002 Device
      description: Select the ESPHome device with the DFRobot C4002 mmWave sensor.
      selector:
        device:
          integration: esphome

    trigger_condition:
      name: Trigger On
      description: Which target status should trigger this automation?
      default: any_presence
      selector:
        select:
          options:
            - label: "Any Presence (Static or Motion)"
              value: any_presence
            - label: "Motion Only"
              value: motion_only
            - label: "Static Presence Only"
              value: static_only
            - label: "No Target (Cleared)"
              value: no_target

    use_direction_filter:
      name: Filter by Movement Direction
      description: Optionally restrict trigger to a specific movement direction.
      default: false
      selector:
        boolean:

    required_direction:
      name: Required Direction
      description: Only trigger if movement direction matches this value (requires direction filter enabled).
      default: "Approaching"
      selector:
        select:
          options:
            - label: "Approaching"
              value: "Approaching"
            - label: "Away"
              value: "Away"
            - label: "No Direction"
              value: "No Direction"

    use_distance_filter:
      name: Filter by Presence Distance
      description: Optionally restrict trigger to detections within a maximum distance.
      default: false
      selector:
        boolean:

    max_distance_cm:
      name: Maximum Detection Distance (cm)
      description: Only trigger if detected presence distance is within this value (requires distance filter enabled).
      default: 300
      selector:
        number:
          min: 10
          max: 1000
          step: 10
          unit_of_measurement: cm

    trigger_delay:
      name: Trigger Delay
      description: >
        Optional delay before the trigger fires. Useful to debounce quick
        state changes (e.g., sensor flicker).
      default:
        hours: 0
        minutes: 0
        seconds: 0
      selector:
        duration:

    actions:
      name: Actions
      description: Actions to run when the trigger condition is met.
      selector:
        action:

variables:
  esphome_device: !input esphome_device
  trigger_condition: !input trigger_condition
  use_direction_filter: !input use_direction_filter
  required_direction: !input required_direction
  use_distance_filter: !input use_distance_filter
  max_distance_cm: !input max_distance_cm

  # Resolve entity IDs from the selected device by matching entity names
  target_status_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'target_status')
       | reject('search', 'text')
       | list | first | default('') }}

  direction_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'movement_direction')
       | reject('search', 'number')
       | list | first | default('') }}

  distance_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'existing_distance')
       | list | first | default('') }}

trigger:
  - platform: template
    value_template: >
      {% if target_status_entity == '' %}
        false
      {% else %}
        {% set status = states(target_status_entity) | int(-1) %}
        {% if trigger_condition == 'any_presence' %}
          {{ status in [1, 2] }}
        {% elif trigger_condition == 'motion_only' %}
          {{ status == 2 }}
        {% elif trigger_condition == 'static_only' %}
          {{ status == 1 }}
        {% elif trigger_condition == 'no_target' %}
          {{ status == 0 }}
        {% else %}
          false
        {% endif %}
      {% endif %}

condition:
  - condition: template
    value_template: >
      {% if not use_direction_filter %}
        true
      {% elif direction_entity == '' %}
        true
      {% else %}
        {{ states(direction_entity) == required_direction }}
      {% endif %}

  - condition: template
    value_template: >
      {% if not use_distance_filter %}
        true
      {% elif distance_entity == '' %}
        true
      {% else %}
        {% set dist = states(distance_entity) | float(-1) %}
        {{ dist >= 0 and dist <= max_distance_cm }}
      {% endif %}

action:
  - delay: !input trigger_delay
  - choose: []
    default: !input actions