blueprint:
  name: DFRobot C4002 mmWave Presence Trigger
  description: >
    Trigger automations based on the DFRobot C4002 mmWave presence sensor (via ESPHome).
    Select your ESPHome device and all sensors are resolved automatically.
    Configure separate actions for when presence is detected and when presence is cleared.
    Optionally filter by movement direction and detection distance.
  domain: automation
  author: RSVH
  homeassistant:
    min_version: "2024.6.0"

  input:
    esphome_device:
      name: ESPHome C4002 Device
      description: Select the ESPHome device with the DFRobot C4002 mmWave sensor.
      selector:
        device:
          integration: esphome

    presence_trigger:
      name: Trigger Presence On
      description: Which detection state counts as "presence detected"?
      default: any_presence
      selector:
        select:
          options:
            - label: "Any Presence (Static or Motion)"
              value: any_presence
            - label: "Motion Only"
              value: motion_only
            - label: "Static Presence Only"
              value: static_only

    use_direction_filter:
      name: Filter by Movement Direction
      description: Optionally restrict the presence trigger to a specific movement direction.
      default: false
      selector:
        boolean:

    required_direction:
      name: Required Direction
      description: Only trigger presence actions if movement direction matches this value.
      default: "Approaching"
      selector:
        select:
          options:
            - label: "Approaching"
              value: "Approaching"
            - label: "Away"
              value: "Away"
            - label: "No Direction"
              value: "No Direction"

    use_distance_filter:
      name: Filter by Presence Distance
      description: Optionally restrict the presence trigger to detections within a maximum distance.
      default: false
      selector:
        boolean:

    max_distance_cm:
      name: Maximum Detection Distance (cm)
      description: Only trigger presence actions if detected distance is within this value.
      default: 300
      selector:
        number:
          min: 10
          max: 1000
          step: 10
          unit_of_measurement: cm

    trigger_delay:
      name: Trigger Delay
      description: Optional delay before any action fires (debounce).
      default:
        hours: 0
        minutes: 0
        seconds: 0
      selector:
        duration:

    presence_actions:
      name: Actions — Presence Detected
      description: Actions to run when presence (static or motion) is detected.
      default: []
      selector:
        action:

    no_presence_actions:
      name: Actions — No Presence (Cleared)
      description: Actions to run when no target is detected.
      default: []
      selector:
        action:

variables:
  esphome_device: !input esphome_device
  presence_trigger: !input presence_trigger
  use_direction_filter: !input use_direction_filter
  required_direction: !input required_direction
  use_distance_filter: !input use_distance_filter
  max_distance_cm: !input max_distance_cm

  target_status_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'target_status')
       | reject('search', 'text')
       | list | first | default('') }}

  direction_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'movement_direction')
       | reject('search', 'number')
       | list | first | default('') }}

  distance_entity: >
    {{ device_entities(esphome_device)
       | select('search', 'existing_distance')
       | list | first | default('') }}

  # Resolved current status as integer
  current_status: >
    {% if target_status_entity != '' %}
      {{ states(target_status_entity) | int(-1) }}
    {% else %}
      -1
    {% endif %}

  # True if current status matches the selected presence trigger
  is_presence: >
    {% if presence_trigger == 'any_presence' %}
      {{ current_status in [1, 2] }}
    {% elif presence_trigger == 'motion_only' %}
      {{ current_status == 2 }}
    {% elif presence_trigger == 'static_only' %}
      {{ current_status == 1 }}
    {% else %}
      false
    {% endif %}

  # True if no target detected
  is_no_presence: >
    {{ current_status == 0 }}

trigger:
  - platform: state
    entity_id: !input esphome_device
    id: device_state_change
  - platform: template
    value_template: >
      {{ target_status_entity != '' and
         (states(target_status_entity) | int(-1)) in [-1, 0, 1, 2] }}

condition: []

action:
  - delay: !input trigger_delay

  - choose:
      # Presence detected — with optional filters
      - conditions:
          - condition: template
            value_template: "{{ is_presence }}"
          - condition: template
            value_template: >
              {% if not use_direction_filter or direction_entity == '' %}
                true
              {% else %}
                {{ states(direction_entity) == required_direction }}
              {% endif %}
          - condition: template
            value_template: >
              {% if not use_distance_filter or distance_entity == '' %}
                true
              {% else %}
                {% set dist = states(distance_entity) | float(-1) %}
                {{ dist >= 0 and dist <= max_distance_cm }}
              {% endif %}
        sequence: !input presence_actions

      # No presence detected
      - conditions:
          - condition: template
            value_template: "{{ is_no_presence }}"
        sequence: !input no_presence_actions